$schema: "https://json-schema.org/draft/2020-12/schema"
type: object
additionalProperties: false
required:
  - etmpSafeId
  - nominatedCompany
  - contacts
properties:
  etmpSafeId:
    type: string
  nominatedCompany:
    type: object
    additionalProperties: false
    required:
      - name
      - UTR
      - CRN
    properties:
      name:
        type: string
      UTR:
        type: string
      CRN:
        type: string
  contacts:
    type: array
    items:
      type: object
      additionalProperties: false
      required:
        - name
        - email
        - status
      properties:
        name:
          type: string
        email:
          type: string
          format: email
        status:
          type: string
