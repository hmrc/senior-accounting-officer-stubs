$schema: "https://json-schema.org/draft/2020-12/schema"
type: object
additionalProperties: false
required:
  - etmpSafeId
  - nominatedCompany
  - contacts
properties:
  etmpSafeId:
    maxLength: 75
    type: string
  nominatedCompany:
    type: object
    additionalProperties: false
    required:
      - name
      - crn
      - utr
    properties:
      name:
        maxLength: 160
        type: string
      crn:
        maxLength: 8
        type: string
      utr:
        maxLength: 13
        type: string
  contacts:
    type: array
    items:
      type: object
      additionalProperties: false
      required:
        - name
        - email
        - status
        - language
      properties:
        name:
          maxLength: 254
          type: string
        email:
          maxLength: 254
          type: string
        status:
          maxLength: 20
          type: string
        language:
          maxLength: 5
          type: string
