$schema: "https://json-schema.org/draft/2020-12/schema"
type: array
minItems: 1
maxItems: 2
items:
  type: object
  additionalProperties: false
  required:
    - name
    - email
  properties:
    name:
      type: string
      minLength: 1
      maxLength: 120
    email:
      type: string
      format: email
      minLength: 1
      maxLength: 254
