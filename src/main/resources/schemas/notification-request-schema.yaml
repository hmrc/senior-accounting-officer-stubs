$schema: "https://json-schema.org/draft/2020-12/schema"
type: object
additionalProperties: false
required:
  - companies
  - saos
properties:
  remarks:
    type: string
  staffPID:
    type: string
  companies:
    type: array
    minItems: 1
    items:
      type: object
      required:
        - utr
        - name
        - accPeriodEnd
        - status
        - type
      properties:
        crn:
          type: string
        utr:
          type: string
        name:
          type: string
        accPeriodEnd:
          type: string
          format: date
        status:
          type: string
        type:
          type: string
  saos:
    type: array
    items:
      type: object
      required:
        - name
      properties:
        name:
          type: string
        email:
          type: string
          format: email
        fromDate:
          type: string
          format: date
        toDate:
          type: string
          format: date