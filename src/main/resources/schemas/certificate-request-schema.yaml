$schema: "https://json-schema.org/draft/2020-12/schema"
type: object
additionalProperties: false
required:
  - saoName
  - saoEmail
  - companies
properties:
  submitterName:
    type: string
    maxLength: 254
  saoName:
    type: string
    maxLength: 254
  saoEmail:
    type: string
    format: email
    maxLength: 254
  staffPid:
    type: string
    maxLength: 30
  remarks:
    type: string
    maxLength: 32767
  customerId:
    type: string
    maxLength: 30
  companies:
    type: array
    items:
      type: object
      additionalProperties: false
      required:
        - crn
        - utr
        - name
        - accPeriodEnd
        - status
        - type
        - isCorporationTaxQualified
        - isVatQualified
        - isPayeQualified
        - isInsurancePremiumTaxQualified
        - isStampDutyLandTaxQualified
        - isStampDutyReserveTaxQualified
        - isPetroleumRevenueTaxQualified
        - isCustomsDutiesQualified
        - isExciseDutiesQualified
        - isBankLevyQualified
      properties:
        crn:
          type: string
          maxLength: 8
        utr:
          type: string
          maxLength: 13
        name:
          type: string
          maxLength: 160
        accPeriodEnd:
          type: string
          format: date
        status:
          type: string
          maxLength: 20
        type:
          type: string
          maxLength: 10
        isCorporationTaxQualified:
          type: boolean
        isVatQualified:
          type: boolean
        isPayeQualified:
          type: boolean
        isInsurancePremiumTaxQualified:
          type: boolean
        isStampDutyLandTaxQualified:
          type: boolean
        isStampDutyReserveTaxQualified:
          type: boolean
        isPetroleumRevenueTaxQualified:
          type: boolean
        isCustomsDutiesQualified:
          type: boolean
        isExciseDutiesQualified:
          type: boolean
        isBankLevyQualified:
          type: boolean
        qualificationStatement:
          type: string
          maxLength: 32767
