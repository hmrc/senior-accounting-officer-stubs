$schema: "https://json-schema.org/draft/2020-12/schema"
type: object
additionalProperties: false
required:
  - saoName
  - saoEmail
  - companies
properties:
  submitterName:
    type: string
  saoName:
    type: string
  saoEmail:
    type: string
    format: email
  staffPID:
    type: string
  remarks:
    type: string
  companies:
    type: array
    items:
      type: object
      additionalProperties: false
      required:
        - utr
        - name
        - accPeriodEnd
        - status
        - type
        - isCorporationTaxQualified
        - isVatQualified
        - isPayeQualified
        - isInsurancePremiumTaxQualified
        - isStampDutyLandTaxQualified
        - isStampDutyReserveTaxQualified
        - isPetroleumRevenueTaxQualified
        - isCustomsDutiesQualified
        - isExciseDutiesQualified
        - isBankLevyQualified
      properties:
        crn:
          type: string
        utr:
          type: string
        name:
          type: string
        accPeriodEnd:
          type: string
          format: date
        status:
          type: string
        type:
          type: string
        isCorporationTaxQualified:
          type: boolean
        isVatQualified:
          type: boolean
        isPayeQualified:
          type: boolean
        isInsurancePremiumTaxQualified:
          type: boolean
        isStampDutyLandTaxQualified:
          type: boolean
        isStampDutyReserveTaxQualified:
          type: boolean
        isPetroleumRevenueTaxQualified:
          type: boolean
        isCustomsDutiesQualified:
          type: boolean
        isExciseDutiesQualified:
          type: boolean
        isBankLevyQualified:
          type: boolean
        qualificationStatement:
          type: string
