info:
  name: put contact details (400) Invalid body
  type: http
  seq: 9

http:
  method: PUT
  url: "{{baseUrl}}/contact-details/123"
  headers:
    - name: Authorization
      value: Basic {{base64Password}}
  body:
    type: json
    data: |-
      [
        {@@@
          "name": "Jane Doe",
          "email": "jane.doe@acme.com"
        }
      ]
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
