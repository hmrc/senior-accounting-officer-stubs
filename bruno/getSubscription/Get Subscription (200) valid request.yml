info:
  name: Get Subscription (200) valid request
  type: http
  seq: 1

http:
  method: GET
  url: "{{baseUrl}}/views/iv_subscriptions/{{subscriptionId}}"
  headers:
    - name: Authorization
      value: Basic {{base64Password}}
    - name: correlationId
      value: "{{$randomUUID}}"
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
