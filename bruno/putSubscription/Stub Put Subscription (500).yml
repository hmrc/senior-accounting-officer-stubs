info:
  name: Stub Put Subscription (500)
  type: http
  seq: 5

http:
  method: POST
  url: "{{baseUrl}}/test-only/signup/config"
  body:
    type: json
    data: |-
      {
        "utr": "{{utr}}",
        "putDpsSubscription": {
          "status": 500,
          "defaultBodyOverride" : {{payload}}
        }
      }
  auth: inherit

runtime:
  scripts:
    - type: before-request
      code: |-
        const payload = JSON.stringify(`{
          "origin": "HIP",
          "response": {
            "failures": [
              {
                "type": "string",
                "reason": "string"
              }
            ]
          }
        }`);

        bru.setVar("payload", payload);

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
